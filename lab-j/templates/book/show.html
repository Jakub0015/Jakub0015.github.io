{% extends "layout.html" %}

{% block title %}{{ book["title"] }}{% endblock %}

{% block content %}
<h1>Podgląd książki</h1>

<table class="table">
    <tbody>
        <tr><th>Id</th><td>{{ book["id"] }}</td></tr>
        <tr><th>Tytuł</th><td>{{ book["title"] }}</td></tr>
        <tr><th>Autor</th><td>{{ book["author"] }}</td></tr>
        <tr><th>Rok</th><td>{{ book["year"] }}</td></tr>
    </tbody>
</table>

<div class="actions" style="margin-top:16px;">
    <a class="btn" href="/">← Powrót do listy</a>
    <a class="btn btn-primary" href="/book/{{ book['id'] }}/edit">Edytuj</a>
</div>
{% endblock %}
